<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFT オーグメント評価ノート</title>
    <style>
        :root {
            --bg:#f7f9fc; --panel:#ffffff; --ink:#333; --sub:#64748b;
            --accent:#ffde6a; --line:#e2e8f0;
            --soku:#dc2626; --soku-bg:#fee2e2;
            --tori:#d97706; --tori-bg:#fef9c3;
            --da:#2563eb;   --da-bg:#dbeafe;
            --batsu:#475569; --batsu-bg:#e2e8f0;
        }
        * { box-sizing:border-box; }
        body {
            font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;
            background:var(--bg); color:var(--ink); margin:0; padding:10px;
        }
        h1 {
            color:#4a5568; font-size:19px; margin:6px 0 12px; text-align:center;
            text-shadow:1px 1px 0 #fff, 2px 2px 0 var(--accent);
        }
        .wrap { max-width:1280px; margin:0 auto; }

        /* スティッキー操作バー（タブ＋フィルタ） */
        .bar {
            position:sticky; top:0; z-index:30; background:var(--panel);
            border:2px solid #333; border-radius:14px; box-shadow:0 4px 0 #333;
            padding:10px; margin-bottom:14px; display:flex; flex-direction:column; gap:9px;
        }
        .tabs { display:flex; gap:6px; }
        .tab {
            flex:1 1 0; padding:9px 6px; font-size:14px; font-weight:bold; text-align:center;
            border:2px solid #333; border-radius:10px; background:#fff; box-shadow:2px 2px 0 #333;
            cursor:pointer; white-space:nowrap; transition:transform .1s, box-shadow .1s;
        }
        .tab:active { transform:translate(1px,1px); box-shadow:0 0 0 #333; }
        .tab[data-tier="silver"].active { background:#cbd5e1; }
        .tab[data-tier="gold"].active   { background:#fef08a; }
        .tab[data-tier="prism"].active  { background:#fbcfe8; }

        .filters { display:flex; flex-wrap:wrap; gap:7px; align-items:center; }
        .search {
            flex:1 1 100%; min-width:0; padding:8px 11px; font-size:14px; font-family:inherit;
            border:2px solid #333; border-radius:10px;
        }
        .search:focus { outline:none; }
        .fsel {
            flex:1 1 0; min-width:96px; padding:7px 8px; font-size:13px; font-weight:bold; font-family:inherit;
            border:2px solid #333; border-radius:10px; background:#fff; cursor:pointer;
        }
        .count { flex:0 0 auto; font-size:12px; font-weight:bold; color:var(--sub); margin-left:auto; padding:4px 2px; }
        @media (min-width:640px){
            .search { flex:1 1 200px; }
        }

        /* カードグリッド：モバイル1列 → タブレット2列 → PC3列 */
        .cards { display:grid; grid-template-columns:1fr; gap:12px; }
        @media (min-width:680px){  .cards { grid-template-columns:repeat(2,1fr); } }
        @media (min-width:1040px){ .cards { grid-template-columns:repeat(3,1fr); } }
        .pane { display:none; }
        .pane.active { display:block; }

        /* 1オーグメント＝1カード */
        .card {
            display:flex; flex-direction:column; gap:9px; background:var(--panel);
            border:2px solid #333; border-radius:14px; box-shadow:2px 2px 0 #333; padding:12px;
        }
        .card.is-soku  { border-color:var(--soku);  box-shadow:2px 2px 0 var(--soku); }
        .card.is-tori  { border-color:var(--tori);  box-shadow:2px 2px 0 var(--tori); }
        .card.is-da    { border-color:var(--da);    box-shadow:2px 2px 0 var(--da); }
        .card.is-batsu { opacity:.62; }

        .c-head { display:flex; align-items:center; gap:10px; }
        .c-icon {
            width:44px; height:44px; flex:0 0 auto; border-radius:10px; border:2px solid #333;
            background:#222; object-fit:contain;
        }
        .c-title { flex:1 1 auto; min-width:0; font-weight:bold; font-size:15px; line-height:1.3; }
        .prio {
            flex:0 0 auto; width:62px; padding:7px 4px; font-size:14px; font-weight:bold; text-align:center;
            border:2px solid #333; border-radius:10px; cursor:pointer; font-family:inherit; background:#fff;
            text-align-last:center;
        }
        .prio.p-soku  { color:var(--soku);  background:var(--soku-bg); }
        .prio.p-tori  { color:var(--tori);  background:var(--tori-bg); }
        .prio.p-da    { color:var(--da);    background:var(--da-bg); }
        .prio.p-batsu { color:var(--batsu); background:var(--batsu-bg); }

        .genres { display:flex; flex-wrap:wrap; gap:5px; }
        .badge {
            display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:bold;
            border:1px solid #333;
        }
        .genre-money   { background:#bbf7d0; }
        .genre-battle  { background:#fecaca; }
        .genre-item    { background:#bfdbfe; }
        .genre-special { background:#e9d5ff; }

        .effect { font-size:13px; line-height:1.55; color:#1f2937; }

        .c-foot { border-top:1.5px dashed var(--line); padding-top:9px; display:flex; flex-direction:column; gap:8px; }
        .field-row { display:flex; align-items:center; gap:8px; }
        .field-lbl { flex:0 0 auto; font-size:11px; font-weight:bold; color:var(--sub); width:70px; }
        .rchips { display:flex; gap:5px; flex-wrap:wrap; }
        .rchip {
            font-size:12px; font-weight:bold; border:1.5px solid #cbd5e1; border-radius:13px;
            padding:3px 11px; cursor:pointer; background:#f8fafc; color:#94a3b8; user-select:none;
        }
        .rchip input { position:absolute; opacity:0; width:0; height:0; }
        .rchip.on { background:var(--accent); color:#333; border-color:#333; }
        .memo {
            width:100%; border:1.5px solid #cbd5e1; border-radius:8px; padding:7px; font-family:inherit;
            font-size:13px; resize:vertical; background:#fff;
        }
        .memo:focus { outline:none; border-color:#333; background:#fffdf2; }

        .empty { grid-column:1/-1; text-align:center; color:#94a3b8; font-weight:bold; padding:30px; }
    </style>
</head>
<body>
<div class="wrap">

                <option value="3-2">3-2</option>

</div>

                { name: "盗賊団 II++", genre: "アイテム", icon: "thieves_glove_plus.png", effect: "「盗賊のグローブ」2個を獲得。対人戦を3回行ったあとに、もう1個獲得する。" },
                { name: "特性の木", genre: "アイテム", icon: "thetraittree_iii.png", effect: "ランダムな紋章アイテム3個、「再合成装置」1個と2ゴールドを獲得する。", defaultRound: "2-1" },

                { name: "仲間を作ろう", genre: "特殊", icon: "constructacompanion_iii.png", effect: "ランダムな★3のコスト1チャンピオンを1体獲得する。8ゴールドを獲得する。", defaultRound: "2-1" },
                { name: "バースデープレゼント", genre: "特殊", icon: "golden-gifts-iii.png", effect: "プレイヤーがレベルアップするたびに、★★のチャンピオン1体と1ゴールドを獲得する。プレイヤーのレベルから4を引いた値が、獲得できるチャンピオンのコストティアになる(上限: コスト5)。", defaultRound: "2-1" },
                { name: "バフが1つ、バフが2つ", genre: "アイテム", icon: "two_buffs.png", effect: "「レッドバフ」を1個、「ブルーバフ」を1個、「チャンピオン複製器」を1個獲得。" },
                { name: "バロンの巣", genre: "戦闘", icon: "baron.png", effect: "タンクアイテム1個。開始8秒後から戦闘終了まで、チームの攻撃・魔力が毎秒5%増加。" },
                { name: "パンドラのアイテム III", genre: "アイテム", icon: "pandora3.png", effect: "ラウンド開始時: ベンチのアイテムがランダムに変更される。ランダムなレディアントアイテムを1個獲得する。", defaultRound: "2-1" },
                { name: "プリズムチケット", genre: "金策", icon: "goldenticket3.png", effect: "ショップをリロールするたびに、50%の確率で無料リロール1回分を獲得する。", defaultRound: "2-1" },
                { name: "ヘッジファンド", genre: "金策", icon: "richgetricher3.png", effect: "25ゴールドを獲得する。利子の最大額が10まで増加する。", defaultRound: "2-1" },
                { name: "ヘッジファンド+", genre: "金策", icon: "hedge_fund.png", effect: "30ゴールドを獲得する。利子の最大額が10まで増加する。" },
                { name: "ベルト オーバーフロー", genre: "アイテム", icon: "belt_overflow.png", effect: "「ジャイアント ベルト」を4個獲得。装備すると体力が85増加する。" },
                { name: "報復", genre: "アイテム", icon: "hand_of_justice.png", effect: "「HOJ」2個。装備者は正確無比を獲得し、クリティカル率が15%増加する。" },
                { name: "待つ価値あり II", genre: "特殊", icon: "worththewait_iii.png", effect: "ランダムなコスト2のチャンピオン1種類を2体獲得する。", defaultRound: "2-1" },
                { name: "ミニマックス", genre: "アイテム", icon: "minimax.png", effect: "「黄金のアイテム除去装置」1個と、ランダムな素材アイテムを4個獲得する。" },
                { name: "もっと怖いキャップ", genre: "アイテム", icon: "hat_overflow.png", effect: "「ラバドン デスキャップ」を1個獲得する。装備者がキルまたはアシストを獲得するたび、「ラバドン デスキャップ」の魔力が恒久的に1%増加する。", defaultRound: "2-1" },
                { name: "もっと小さな巨人", genre: "金策", icon: "smaller_giant.png", effect: "毎ラウンド終了時プレイヤー体力+2、2G、タクティシャン速度UP。即座に10G。" },
                { name: "ラッキーグローブ", genre: "アイテム", icon: "lucky-gloves-iii.png", effect: "「盗賊のグローブ」が毎回、そのチャンピオンにとって理想的なアイテムを付与するようになる。「スパーリング グローブ」を2個獲得する。", defaultRound: "2-1" },
                { name: "ラッキーグローブ+", genre: "アイテム", icon: "lucky_gloves.png", effect: "「盗賊のグローブ」が常に推奨アイテムを付与。即座に2個、4回対人戦後もう1個。" },
                { name: "レベルアップ！", genre: "特殊", icon: "levelup3.png", effect: "経験値を購入する際、追加で経験値を2 XP獲得する。即座に経験値を8 XP獲得する。", defaultRound: "2-1" },
                { name: "ワンド オーバーフロー", genre: "アイテム", icon: "wand_overflow.png", effect: "「ムダニ デカイ ロッド」を4個獲得。ロッドが攻撃速度5%を付与するようになる。" }
            ]
        };

        const imageBaseUrl = "https://cdn.metatft.com/cdn-cgi/image/width=46,height=46,fit=cover,format=auto/https://cdn.metatft.com/file/metatft/augments/";
        const TIERS = ["silver","gold","prism"];
        const GENRE_CLASS = {"金策":"genre-money","戦闘":"genre-battle","アイテム":"genre-item","特殊":"genre-special"};
        const ROUNDS = ["2-1","3-2","4-2"];
        const PRIO_CLASS = {soku:"p-soku", tori:"p-tori", da:"p-da", batsu:"p-batsu"};
        const PRIO_CARD  = {soku:"is-soku", tori:"is-tori", da:"is-da", batsu:"is-batsu"};

        let activeTier = "silver";
        const cards = {}; // rowId -> {el, name, effect, genre}

        function genreArr(g){
            if(Array.isArray(g)) return g.filter(Boolean);
            if(typeof g === "string" && g) return g.split(",").map(s=>s.trim()).filter(Boolean);
            return [];
        }
        function esc(s){ return String(s==null?"":s)
            .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

        function init(){
            // タブ切り替え
            document.querySelectorAll(".tab").forEach(tab=>{
                tab.addEventListener("click", ()=>{
                    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
                    document.querySelectorAll(".pane").forEach(p=>p.classList.remove("active"));
                    tab.classList.add("active");
                    activeTier = tab.dataset.tier;
                    document.getElementById("pane-"+activeTier).classList.add("active");
                    applyFilters();
                });
            });

            // カード生成
            TIERS.forEach(tier=>{
                const grid = document.getElementById("cards-"+tier);
                (augmentsData[tier]||[]).forEach((aug, index)=>{
                    const rowId = tier + "-" + index;
                    grid.appendChild(makeCard(aug, rowId, tier));
                });
            });

            // フィルタ配線
            document.getElementById("search").addEventListener("input", applyFilters);
            document.getElementById("filter-prio").addEventListener("change", applyFilters);
            document.getElementById("filter-genre").addEventListener("change", applyFilters);
            document.getElementById("filter-round").addEventListener("change", applyFilters);

            applyFilters();
        }

        function makeCard(aug, rowId, tier){
            const gList = genreArr(aug.genre);

            // 保存値
            const savedPrio = localStorage.getItem("prio-"+rowId) || "";
            const savedMemo = localStorage.getItem("memo-"+rowId) || "";
            const defaultRound = aug.defaultRound || "";
            const savedRound = localStorage.getItem("round-"+rowId) !== null
                ? localStorage.getItem("round-"+rowId) : defaultRound;
            // 旧版と同じ初期シード保存
            if(localStorage.getItem("round-"+rowId) === null && defaultRound !== ""){
                localStorage.setItem("round-"+rowId, defaultRound);
            }
            const roundTokens = (savedRound||"").split(",").map(s=>s.trim()).filter(Boolean);

            const card = document.createElement("div");
            card.className = "card";
            card.id = "card-" + rowId;

            const iconUrl = aug.icon && aug.icon.startsWith("http") ? aug.icon : (imageBaseUrl + (aug.icon||""));

            const badges = gList.map(g=>
                '<span class="badge '+(GENRE_CLASS[g]||"")+'">'+esc(g)+'</span>').join("");

            const prioOpts = [["","-"],["soku","即"],["tori","取"],["da","妥"],["batsu","×"]]
                .map(([v,l])=>'<option value="'+v+'"'+(savedPrio===v?" selected":"")+'>'+l+'</option>').join("");

            card.innerHTML =
              '<div class="c-head">'+
                '<img class="c-icon" src="'+iconUrl+'" alt="" onerror="this.style.opacity=0.3">'+
                '<div class="c-title">'+esc(aug.name)+'</div>'+
                '<select class="prio" id="prio-'+rowId+'">'+prioOpts+'</select>'+
              '</div>'+
              (badges ? '<div class="genres">'+badges+'</div>' : '')+
              '<div class="effect">'+esc(aug.effect)+'</div>'+
              '<div class="c-foot">'+
                '<div class="field-row">'+
                  '<span class="field-lbl">出現ラウンド</span>'+
                  '<div class="rchips" id="rchips-'+rowId+'">'+
                    ROUNDS.map(r=>'<label class="rchip'+(roundTokens.includes(r)?" on":"")+'">'+
                      '<input type="checkbox" value="'+r+'"'+(roundTokens.includes(r)?" checked":"")+'><span>'+r+'</span></label>').join("")+
                  '</div>'+
                '</div>'+
                '<div class="field-row" style="align-items:flex-start">'+
                  '<span class="field-lbl" style="margin-top:6px">メモ</span>'+
                  '<textarea class="memo" id="memo-'+rowId+'" rows="2" placeholder="メモを入力…">'+esc(savedMemo)+'</textarea>'+
                '</div>'+
              '</div>';

            // 優先度
            const prioSel = card.querySelector("#prio-"+CSS.escape(rowId));
            function paintPrio(){
                card.classList.remove("is-soku","is-tori","is-da","is-batsu");
                prioSel.className = "prio";
                const v = prioSel.value;
                if(PRIO_CLASS[v]){ prioSel.classList.add(PRIO_CLASS[v]); card.classList.add(PRIO_CARD[v]); }
            }
            paintPrio();
            prioSel.addEventListener("change", ()=>{
                localStorage.setItem("prio-"+rowId, prioSel.value);
                paintPrio(); applyFilters();
            });

            // ラウンド（チップ・複数選択）
            const rwrap = card.querySelector("#rchips-"+CSS.escape(rowId));
            rwrap.querySelectorAll("input").forEach(cb=>{
                cb.addEventListener("change", ()=>{
                    cb.closest(".rchip").classList.toggle("on", cb.checked);
                    const vals = Array.from(rwrap.querySelectorAll("input:checked")).map(x=>x.value);
                    localStorage.setItem("round-"+rowId, vals.join(", "));
                    applyFilters();
                });
            });

            // メモ
            const memo = card.querySelector("#memo-"+CSS.escape(rowId));
            memo.addEventListener("input", ()=> localStorage.setItem("memo-"+rowId, memo.value));

            cards[rowId] = {
                el: card,
                name: (aug.name||"").toLowerCase(),
                effect: (aug.effect||"").toLowerCase(),
                genre: gList.join(",")
            };
            return card;
        }

        function applyFilters(){
            const q       = document.getElementById("search").value.trim().toLowerCase();
            const prioF   = document.getElementById("filter-prio").value;
            const genreF  = document.getElementById("filter-genre").value;
            const roundF  = document.getElementById("filter-round").value;

            const grid = document.getElementById("cards-"+activeTier);
            const list = (augmentsData[activeTier]||[]);
            let shown = 0;

            list.forEach((aug, index)=>{
                const rowId = activeTier + "-" + index;
                const c = cards[rowId]; if(!c) return;

                const prio  = localStorage.getItem("prio-"+rowId) || "";
                const memo  = (localStorage.getItem("memo-"+rowId) || "").toLowerCase();
                const round = (localStorage.getItem("round-"+rowId) || "").toLowerCase();

                const mText  = !q || c.name.includes(q) || c.effect.includes(q) || memo.includes(q);
                const mPrio  = !prioF || prio === prioF;
                const mGenre = !genreF || c.genre.split(",").includes(genreF);
                const mRound = !roundF || round.includes(roundF.toLowerCase());

                const vis = mText && mPrio && mGenre && mRound;
                c.el.style.display = vis ? "" : "none";
                if(vis) shown++;
            });

            // 空表示
            let emptyEl = grid.querySelector(".empty");
            if(shown === 0){
                if(!emptyEl){
                    emptyEl = document.createElement("div");
                    emptyEl.className = "empty"; emptyEl.textContent = "該当なし";
                    grid.appendChild(emptyEl);
                }
            } else if(emptyEl){ emptyEl.remove(); }

            document.getElementById("count").textContent = "表示 " + shown + " / 全 " + list.length + " 件";
        }

        window.onload = init;

</script>
</body>
</html>
